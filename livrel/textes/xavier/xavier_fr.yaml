      display:
      presentation: |
        Xavier Ramos Vilar, lorsqu’il a entendu parler pour la première fois de la maladie étrange de la COVID-19, apparue en Chine, n’avait que 15 ans. Il était élève de 10e année à l’École vocationnelle militaire Camilo Cienfuegos, à Arroyo Arenas, dans la municipalité de La Lisa, province de La Havane. 
        
        Dans ce type d’enseignement, on met l’accent sur l’information et la communication pour la préparation politique des adolescents qui souhaitent choisir des carrières militaires et devenir de futurs spécialistes des forces armées du pays ; il est donc exigé d’être à jour sur les informations nationales et internationales, dans tous les domaines de la vie. C’est ainsi qu’il a suivi l’évolution du virus SARS‑CoV‑2, responsable de la maladie mortelle COVID‑19. 
        
        Le 11 mars, date à laquelle l’Organisation mondiale de la santé (OMS) déclare officiellement que la flambée épidémique présente sur tous les continents est une pandémie, et où l’on annonce aussi les trois premiers cas à Cuba, coïncide avec le 16e anniversaire de Xavier — une date qu’il n’oubliera jamais, à cause des circonstances dramatiques que le monde a dû vivre. 
        
        Il a fait ses études primaires et son premier cycle du secondaire dans des écoles de sa localité, puis il est entré dans l’enseignement moyen supérieur chez les « Camilitos ». 
        
        Aujourd’hui, à 21 ans, il travaille au service informatique de l’Institut cubain de chirurgie ophtalmologique Ramón Pando Ferrer, à La Havane, Cuba. Son lien avec Granjita Feliz lui a permis de développer ses réflexions sur la pandémie.   
          
