      presentation: |
          Daniela Beatriz de la Rosa Abreu est originaire de la province de Cienfuegos, où elle a fréquenté un Círculo Infantil, lieu où apparaissent les premières manifestations de l’éducation formelle comme forme de socialisation institutionnelle. Elle a commencé ses études préscolaires à l’école Francisco Pérez Germán, dans la municipalité où elle réside aujourd’hui, et elle y a étudié jusqu’à la sixième année de l’enseignement primaire. Très tôt attirée par les arts, elle a intégré la troupe théâtrale de La Colmenita. 
          
          À l’âge de 8 ans, elle a entendu parler du virus de la COVID-19, puis des longues « vacances » qu’il a imposées aux enfants et aux familles cubaines, lorsque le cycle scolaire a été interrompu brutalement, ce qui lui a causé de nombreuses difficultés sur le plan psychosocial, sans avoir souffert directement de la maladie. 
          
          La distanciation sociale a provoqué chez elle une augmentation de l’appétit qui l’a fait prendre du poids ; l’obésité a entraîné une atteinte des ligaments du genou, ayant nécessité une intervention chirurgicale à l’étape de la « nouvelle normalité ». 
          
          Dans le cadre de la pandémie, elle a tiré des apprentissages importants, elle a développé ses capacités d’interprétation, et l’une de ses vidéos a été diffusée à la télévision, ainsi que sur les réseaux sociaux. Elle a aussi acquis des connaissances sur différentes tâches agricoles avec son père, et des connaissances d’art culinaire avec sa grand-mère. 
          
          Avec ses 38 camarades de classe, elle a réfléchi pendant deux ans à la COVID-19 au sein du potager El Garabato, dans le projet Granjita Feliz, échange qui a enrichi ses connaissances. Elle a donné des déclarations à Canal Habana et à Cubavisión au sujet de ses activités agricoles, ainsi que pour l’émission Grande Seré (Canal Educativo). Elle a participé à la Rencontre de poésie pour l’Équilibre du monde, organisée par la Société culturelle José Martí, en tant que membre de l’atelier littéraire Histoires de vie de la COVID-19. 
