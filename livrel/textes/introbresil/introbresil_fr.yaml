title: >-
    Introduction
subtitle: >-
    Xondaro et xondaria rembiapó : Jeunesse guaranie mbya, territoire et création collective
blockcitation: true
authors:
    - forname: Kelly
      surname: Russo
      orcidurl:
      display:
      presentation: >-
        Kelly Russo est chercheuse et professeure à l’Université de l’État de Rio de Janeiro (UERJ), coordonnatrice du Núcleo de Estudos e Pesquisas com Povos Indígenas, Interculturalidade e Educação (NEPIIE). Elle œuvre depuis plus d’une décennie en partenariat avec des communautés autochtones de l’État de Rio de Janeiro, en particulier avec le peuple Guarani Mbya de Mata Verde Bonita, où ce projet a été développé.  
    - forname: Miguel
      surname: Verá Mirim
      orcidurl:
      display:
      presentation: >-
        Miguel Verá Mirim est l’un des leaders guarani mbya, membre de l’aldeia Mata Verde Bonita (Maricá/RJ). Il agit dans des processus communautaires de renforcement culturel, de registre de la mémoire collective et de participation des jeunes. Il développe des actions liées à la communication communautaire, à l’audiovisuel et à la création d’espaces de prise de parole et de protagonisme pour les jeunes guaranis, contribuant ainsi à la continuité du mbya reko et à l’articulation entre différentes aldeias de la région.   
    - forname: Maria Martinha
      surname: Guajajara
      orcidurl:
      display:
      presentation: >-
        
      surname: Samaniego
      orcidurl:
      display:
      presentation: >-
        Tayna Samaniego est Guaranie Nhandeva, vit et travaille comme professeure dans la communauté de Mata Verde Bonita à Maricá. Elle est l’une des jeunes leaders de cette communauté et termine actuellement son cours de Pédagogie à l’Université de l’État de Rio de Janeiro (UERJ). Elle se consacre à des recherches sur les jeunesses autochtones, l’éducation scolaire autochtone, les politiques éducatives et les processus de reprise identitaire.     
