title: >-
    Souleymane e Cynthia 
subtitle: >-
blockcitation: true
authors:
    - forname:
      surname: Cynthia
      orcidurl:
      display:
      presentation: |
        Olá, sou Cynthia, tenho 16 anos e sou do México. Gostaria de explicar o que é uma casa para mim. É um lugar para dormir, um espaço para a família, onde passamos a maior parte do tempo. Há quatro anos eu morava no México, em uma cidade pequena chamada Xalapa, no estado de Veracruz, onde eu estava sempre cercada pela minha família. À tarde eu ia brincar com minhas primas, ver meus avós, comer com eles, e assim todos os dias. Até que um dia me mudei com minha mãe, meu pai e meus dois irmãos para o Quebec, onde aprendi francês. Conheci pessoas que me fizeram sentir em casa novamente. A casa é o lugar onde nos sentimos mais seguros e protegidos. É onde nos refugiamos diante dos problemas ou dificuldades. É o lugar onde podemos ser nós mesmos. Por isso, a casa é essencial para nossa saúde emocional e mental. Ela nos permite descansar depois de um longo dia de trabalho ou estudos. A casa nem sempre é um lugar físico. São pessoas que me fazem sentir em paz, com quem sinto um amor mútuo e verdadeiro. 
    - forname:
      surname: Souleymane
      orcidurl:
      display:
      presentation: |
        As-salāmu ʿalaykum wa raḥmatu-llāhi wa barakātuh. Olá a todos, sou Souleymane, tenho 18 anos e sou da República Centro-Africana. Cresci no Chade e sou muçulmano. Minha religião é muito importante para mim. Ela me dá força para enfrentar momentos difíceis. Rezar me faz muito bem. Cheguei ao Quebec em 2019 e atualmente moro em Trois-Rivières. Tenho grandes sonhos. Me preocupo com o bem-estar das pessoas, como pessoas com deficiência e pessoas em situação de rua. Ajudar os outros me traz muita satisfação. Sou sociável, sempre dou o meu melhor. Sou educado, prestativo, sempre sorridente e independente. A gentileza e a sinceridade são minhas maiores qualidades. Falo três línguas: árabe, sango e francês. Estou aprendendo inglês. Gosto de trabalho manual e físico porque sou muito habilidoso com as mãos. Tenho muito prazer em aprender. No meu tempo livre, gosto de consertar coisas. 
