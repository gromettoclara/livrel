      surname: Cynthia
      orcidurl:
      display:
      presentation: |
        Hola, soy Cynthia, tengo 16 años y soy de México. Bonjour, je m’appelle Cynthia, j’ai 16 ans et je viens du Mexique. J'aimerais vous expliquer c’est quoi une maison pour moi. Un endroit pour dormir, un lieu pour la famille, l'espace où nous passons le plus temps. Il y a quatre ans, je vivais au Mexique dans une petite ville qui s'appelle Veracruz, Xalapa, où j'étais toujours autour de ma famille. Les après-midis, j'allais jouer avec mes cousines, voir mes grands-parents, manger avec eux et ainsi de suite tous les jours. Jusqu'à un jour j'ai déménagé avec ma mère, mon père et mes deux frères au Québec où j'ai appris le français. J'ai rencontré des gens qui m'ont fait sentir à nouveau chez moi. La maison, c'est l'endroit où nous sentons le plus en sécurité et le plus protégés. C'est là où nous nous réfugions face à tous les problèmes ou difficultés qui se présentent à nous. C'est l'endroit où nous pouvons être nous-mêmes. Pour cette raison, la maison est essentielle à notre santé émotionnelle et mentale. Elle nous permet de nous étendre et de nous reposer après une longue journée de travail ou des études. La maison, c'est pas toujours un lieu. Ce sont des gens qui m'ont fait sentir en paix, avec qui je ressens un amour mutuel et réel.  
    - forname:
      surname: Souleymane
      orcidurl:
      display:
      presentation: |
        As‑salāmu ʿalaykum wa raḥmatu‑llāhi wa barakātuh. Bonjour tout le monde, je suis Souleymane, j'ai 18 ans, je suis centrafricain. J'ai grandi au Tchad, je suis musulman. Ma religion est importante pour moi. Elle me donne la force de passer au travers les choses difficiles. Prier me fait beaucoup de bien. Je suis arrivé au Québec en 2019. Je vis présentement à Trois Rivières. J'ai des grands rêves à réaliser. Je me soucie du bien-être des gens, comme les handicapés, les sans-abris. Aider les gens me fait beaucoup de plaisir. Je suis sociable, je fais toujours de mon mieux. Je suis poli, serviable, toujours souriant et débrouillard. La gentillesse et la sincérité sont mes plus grandes qualités. Je parle trois langues : arabe, sango, français. J'apprends l'anglais. J'aime le travail manuel et physique puisque je suis très habile de mes mains. J'ai un immense plaisir à apprendre. Dans mes temps libres, j'aime réparer les choses. 
