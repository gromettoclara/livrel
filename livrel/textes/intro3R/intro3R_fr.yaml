      presentation: >-
          Né à Mostar en Bosnie-Herzégovine, arrivé au Québec en tant que réfugié de guerre en compagnie de sa mère et de son frère, Adis Simidzija est un écrivain québécois établi à Trois-Rivières. Dans un style intimiste, ses textes s’intéressent particulièrement aux questions d’identité, d’exil et de langue. Il a plusieurs publications à son actif. En 2021 il contribue au collectif Vies et fictions d’exils paru aux Presses de l’Université Laval. En 2023, il contribue à l’ouvrage collectif Canons. Onze déclarations d’amour littéraire publié chez VLB. À l’automne 2024, il publie chez Bayard Canada Turbulences, son premier roman jeunesse qui a reçu la distinction du Prix coup de cœur du jury dans le cadre des Grands Prix culturels de Trois-Rivières en 2025. En 2025 il publie Les assauts de la mémoire aux éditions Hashtag finaliste en 2026 au Prix des nouvelles voix de la littérature du Salon du livre de Trois-Rivières et finaliste 2026 aux Prix Création en littérature dans le cadre des Prix Arts Excellence de Culture Mauricie. Détenteur d’un baccalauréat en sociologie et d’une maîtrise en littérature, il consacre présentement la plupart de son temps à son travail d’intervenant, de travailleur de rue et à des projets de médiation culturelle qui favorisent le vivre ensemble.
