title: >-
    Aslouba et Chance
subtitle: >-
blockcitation: true
authors:
    - forname:
      surname: Chance
      orcidurl:
      display:
      presentation: |
        Mon nom c'est Chance, j'ai 14 ans, je viens du Burundi. Je venais ici en 2022. Je me passionne pour la batterie, le piano et le beatbox. C'est grâce à la musique que je me fais apprendre. 

    - forname:
      surname: Aslouba
      orcidurl:
      display:
      presentation: |
        Bonjour, je m'appelle Aslouba, j'ai 15 ans, je viens de République centrafricaine. Malgré ma peur des chiens, c'est mon animal préféré. Quand j'étais petit, le chien protégeait la maison contre les voleurs. Quand je suis arrivé au Québec, je voulais adopter un chien mais ma mère ne voulait pas. Depuis que j'ai l'âge de 10 ans, je caresse un très grand rêve, celui d'être médecin. Parce que j'aime bien aider les gens et que j'aimerais aider ma famille. Je n'exclus pas non plus de devenir pompier parce que ça me rend triste de voir des maisons en feu et des vies détruites. L'école a joué un rôle important dans ma vie au Québec puisque c'est à l'école que je me suis fait mon réseau d'amis. L'année dernière, j'ai gagné un prix premier aux élèves qui se sont les plus démarqués. Mes sports préférés sont le tennis, le basket et le football. Quand je suis sur un terrain de tennis, de basket ou de football, je suis habité par une douce joie. Dernièrement, je me suis découvert une passion pour l'écriture au point de m'acheter un ordinateur pour pratiquer à créer. 
