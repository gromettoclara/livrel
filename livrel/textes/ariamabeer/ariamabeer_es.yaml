title: >-
    Ariam y Abeer
subtitle: >-
blockcitation: true
authors:
    - forname: Ariam
      surname: 
      orcidurl:
      display:
      presentation: >-
          Hola, me llamo Ariam, tengo 14 años, pronto voy a cumplir 15. Me gusta mucho Japón por su cultura, su lado muy turístico y su comida. Soy apasionada del arte, y por eso, algún día me gustaría ir a vivir a Tokio, esa ciudad surrealista que parece sacada de los animes. 
          
          Gracias a los animes japoneses descubrí un talento oculto para el dibujo, y eso es lo que hace que hoy esté inscrita en la especialidad de artes plásticas en la escuela. Los japoneses tienen muchas pestañas y eso me inspira. 
          
          Mi animal favorito es el león, porque es impresionante, con su melena suave y hermosa. 
          
          Además del arte, me apasiona el fútbol. Es un deporte que me ayuda a despejar la mente, sobre todo en los días en que me siento menos bien. Me gusta jugar con el balón y entrenar. Me libera la mente. 
          
          Desde que llegué a Canadá, juego fútbol todos los años. Nací en Siria, y fue la guerra la que me convirtió en una exiliada. Me gustaría volver a visitar mi país, ver a mi familia, reconectarme con mi cultura, mi historia y mis recuerdos de infancia, y jugar Risk con mis amigos que se quedaron allá. 
    - forname: Abeer
      surname: 
      orcidurl:
      display:
      presentation: >-
          Hola, me llamo Abeer, tengo 14 años y me fascinan los viajes. También tengo un gato que se llama Boulboul, y me gustaría hacerle descubrir uno de los países más hermosos del mundo. 
          
          Un día pondré a mi gatito en su bolsa de viaje y nos iremos a descubrir la India, donde iremos a oler las flores multicolores y a bailar al ritmo de la música tradicional india. 
          
          Si me gusta tanto la India, es porque cuando era pequeña descubrí una canción india que, todavía hoy, me devuelve la alegría de vivir. 
          
          A pesar de que me encanta la poutine, tengo muchas ganas de que la situación en Siria, mi país de origen, mejore para poder volver, visitarlo y aprender más sobre mi historia y mi cultura, y borrar un poco las ruinas que se han quedado en mi memoria. 
          
          Me gustaría volver a tener contacto con mi familia, ver a mis tías, mis abuelos, mis primos y primas, y enseñarles algunas palabras en francés, mientras les cocino una poutine para que puedan probar un poco de la felicidad de mi vida actual en Quebec. 
