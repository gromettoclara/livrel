title: >-
    Ariam et Abeer
subtitle: >-
blockcitation: true
authors:
    - forname: Ariam
      surname: 
      orcidurl:
      display:
      presentation: >-
          Bonjour, je m'appelle Ariam, j'ai 14 ans, bientôt 15. J'aime beaucoup le Japon pour sa culture, c'est très touristique et sa nourriture. Je suis passionnée d'art et c'est pour cette raison qu'un jour j'aimerais aller vivre à Tokyo, cette ville surréaliste qui ressemble à des animés. C'est grâce aux animés japonais que je me suis découvert un talent caché en dessin et c'est ce qui fait qu'aujourd'hui je suis inscrite en concentration arts plastiques à l'école. Les Japonais ont beaucoup de cils et ça m'inspire. Mon animal préféré c'est le lion car il est flamboyant de beauté avec sa chevelure soyeuse. Outre l’art, je me passionne pour le soccer. C'est un sport qui m'aide à changer les idées, surtout durant les journées que ça va moins bien. J'aime jouer avec le ballon et m'entraîner. Ça libère mon esprit. C'est depuis mon arrivée au Canada que je joue au soccer chaque année. Je suis née en Syrie et c'est la guerre qui a fait de moi une exilée. J'aimerais retourner visiter mon pays et voir ma famille, me reconnecter avec ma culture, mon histoire et mes souvenirs d'enfance. Jouer au jeu Risk avec mes amis qui sont restés là-bas. 
          
    - forname: Abeer
      surname: 
      orcidurl:
      display:
      presentation: >-
          Bonjour, je m'appelle Abeer, j'ai 14 ans et je suis une fascinée de voyage. J'ai aussi un chat qui s'appelle Boulboul et j'aimerais lui faire découvrir un des plus beaux pays du monde. Un jour, je déposerai mon petit chat dans son sac de voyage et nous partirons à la découverte de l'Inde où nous irons sentir l'odeur des fleurs multicolores et danserons au rythme de la musique traditionnelle indienne. Si j'aime autant l'Inde c’est que quand j'étais petite, j'ai découvert une chanson indienne qui me redonne encore à ce jour-là la joie de vivre. Malgré mon amour pour la poutine, j'ai hâte que la situation en Syrie, mon pays d'origine, se règle pour y aller le visiter et en apprendre davantage sur mon histoire, sur ma culture et effacer un peu les ruines qui se sont enracinées dans ma mémoire. J'aimerais reprendre contact avec ma famille, revoir mes tantes, mes grands-parents, mes cousins et cousines et j'aimerais leur apprendre quelques mots en français tout en leur cuisinant une poutine pour qu'ils puissent goûter un peu au bonheur de ma vie actuelle au Québec. 
          
