      presentation: |
            Flavia Sofía Vega Díaz a été surprise par la COVID-19, à tout juste 9 ans, et, dans son innocence d’enfant, elle a cru qu’il s’agissait de brèves vacances, même si sa mère était médecin de famille et que le cabinet médical se trouvait au rez-de-chaussée de la maison. Malgré l’intelligence naturelle de Flavia et les informations récurrentes sur le coronavirus qui circulait dans le monde, on ne lui transmettait pas de nouvelles alarmistes ; tout simplement, c’était une enfant très heureuse. 
            
            Sa petite enfance était chargée, autant que possible, de moments heureux. Sa scolarité primaire s’est déroulée dans une école primaire confortable, Antonio Briones Montoto, relativement proche de chez elle, dans le quartier Franz D’Beche. 
            
            Flavia garde d’excellents souvenirs de sa période scolaire : ses institutrices, l’équipe enseignante, ses petits camarades de classe et de l’école, où, en plus d’étudier, il y avait toujours de la place pour les jeux et les loisirs. Depuis la huitième année, elle se souvient de tout ce qui s’est passé dans son école primaire. 
            
            La période de confinement à la maison, due aux mesures de biosécurité imposées par la distanciation et l’isolement social, l’impact des cas pris en charge au cabinet médical situé au rez-de-chaussée, l’augmentation exponentielle des cas, ainsi que les conférences quotidiennes du Dr Durán présentant la situation nationale et internationale, retenaient son attention, independament de ses cours desormais transmis par la télévision nationale. Il y avait aussi le fait de partager le quotidien avec sa sœur, plus jeune de quatre ans, avec une personnalité différente, ce qui exigeait de la mère une attention constante. 
            
            Flavia, très intelligente et capable, a accompli un travail remarquable : elle s’est rapprochée de la nature, a donné des entrevues à la télévision depuis le potager « El Garabato » de « Granjita Feliz », et a remporté un prix sur le thème agricole. 
