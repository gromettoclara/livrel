      presentation: >-
          Emily Parra Valdés, nació en La Habana el 24 de julio de 2010, sus padres Elizabeth y Angel, residentes en aquel entonces en el reparto Sierra Maestra, municipio Boyeros, La Habana, donde la niña pasó sus primeros años de vida  y recibió educación institucional en el Círculo Infantil del reparto. 
          
          Inició sus estudios en la escuela primaria Coronel Martín Marrero, donde concluyó el 1er. Grado. 
          
          Con el traslado de residencia del núcleo familiar para el municipio Guanabacoa, cursa el segundo y tercer grados en la escuela primaria Alpízar, en este territorio, en el que concluye la enseñanza primaria en la escuela Quinto Congreso desde el cuarto al sexto Grado. 
          
          Los estudios de la enseñanza Secundaria Básica los ha recibido en la escuela Víctor Muñoz desde el séptimo y hasta el noveno grado, en el que transita actualmente. 
          
          En sus estudios siempre ha presentado notables resultados académicos. 
          
          En su núcleo familiar integrado por 4 personas, padre, madre, la hermana mayor y Emily, los 4 contrajeron la COVIF-19, aunque de forma benigna por la cepa que les afectó y sin ingreso hospitalario. Su tránsito por la pandemia los inició los 10 años 
          
          Emily es integrante del Taller de artes visuales Galería de los Felices del Proyecto Comunitario Granjita Feliz y ha incursionado en otros talleres de artes plásticas. 
          
          Obtuvo el Premio de la Popularidad por votación popular en la séptima edición del Concurso Nacional “Dr. Adolfo Rodríguez Nodals In Memorian”, en la modalidad de artes plásticas. 
          
          Aunque cursa el segundo semestre del año terminal de secundaria básica y está en los inicios de pruebas finales y la opción de solicitudes para estudios Preuniversitarios, de escuelas vocacionales y para técnicos medios se propuso para hacer las ilustraciones de las Historias de Vida de la COVID-19 
          
          Ha participado junto con el Taller de Artes Visuales Galería de Los Felices en diferentes eventos y en el montaje de la Exposición Martí y la Naturaleza, así como en espacios debates sobre el impacto de la COVID-19. 
