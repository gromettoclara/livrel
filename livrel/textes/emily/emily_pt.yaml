      presentation: >-
          Emily Parra Valdés nasceu em Havana, em 24 de julho de 2010. Seus pais, Elizabeth e Angel, moravam, naquela época, no bairro Sierra Maestra, no município de Boyeros (Havana), onde a menina passou seus primeiros anos de vida e recebeu educação institucional no círculo infantil do bairro.  
          
          Ela iniciou seus estudos na escola primária Coronel Martín Marrero, onde concluiu o 1º ano.  
          
          Com a mudança de residência do núcleo familiar para o município de Guanabacoa, cursou o 2º e o 3º anos na escola primária Alpízar, e concluiu o ensino primário na escola Quinto Congreso, do 4º ao 6º ano.  
          
          Ela realizou seus estudos secundários básicos na escola Víctor Muñoz — do 7º ao 9º ano —, onde está cursando atualmente.  
          
          Ao longo da vida escolar, sempre apresentou resultados acadêmicos notáveis.  
          
          No seu núcleo familiar, composto por quatro pessoas — pai, mãe, a irmã mais velha e Emily —, os quatro contraíram a COVID-19, embora de forma benigna pela cepa que os afetou, e sem necessidade de internação hospitalar. A vivência deles na pandemia começou quando Emily tinha 10 anos.  
          
          Emily integra o ateliê de artes visuais Galeria de los Felices, do projeto comunitário Granjita Feliz, e participou de outros ateliês de artes plásticas.   
          
          Ela obteve o prêmio de popularidade, por votação popular, na sétima edição do concurso nacional “Dr. Adolfo Rodríguez Nodals In Memorian”, na modalidade de artes plásticas.   
          
          Embora esteja cursando o segundo semestre do último ano do secundário básico — no início das provas finais e do processo de solicitação de vagas para o pré-universitário, escolas vocacionais e cursos técnicos de nível médio —, ela se propôs a realizar as ilustrações das Histórias de Vida da COVID-19.  
          
          Ela participou, junto com o ateliê de artes visuais Galeria de los Felices, de diferentes eventos e da montagem da exposição Martí e a Natureza, além de espaços de debate sobre o impacto da COVID-19. 
