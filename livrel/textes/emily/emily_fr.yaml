      presentation: >-
          Emily Parra Valdés est née à La Havane le 24 juillet 2010. Ses parents, Elizabeth et Angel, résidaient alors dans le quartier Sierra Maestra, municipalité de Boyeros (La Havane), où l’enfant a passé ses premières années de vie et a reçu une éducation institutionnelle à la garderie au Círculo Infantil du quartier. 
          
          Elle a commencé ses études à l’école primaire Coronel Martín Marrero, où elle a terminé la 1re année. Après le déménagement du foyer familial vers la municipalité de Guanabacoa, elle a effectué la 2e et la 3e années à l’école primaire Alpízar, dans ce territoire, puis elle a achevé l’enseignement primaire à l’école Quinto Congreso, de la 4e à la 6e année. 
          
          Ses études du secondaire de base, elle les a suivies à l’école Víctor Muñoz, de la 7e à la 9e année, qu’elle fréquente actuellement. Tout au long de sa scolarité, elle a obtenu de très bons résultats académiques. 
          
          Dans son foyer composé de quatre personnes — père, mère, sœur aînée et Emily —, les quatre ont contracté la COVID‑19, mais sous une forme bénigne, en raison de la souche qui les a touchés, et sans hospitalisation. Son expérience de la pandémie a commencé à l’âge de 10 ans. 
          
          Emily fait partie de l’atelier d’arts visuels « Galería de los Felices » (Galerie des Heureux) du projet communautaire Granjita Feliz, et elle a également participé à d’autres ateliers d’arts plastiques. Elle a obtenu le Prix de la Popularité, par vote du public, lors de la septième édition du Concours national « Dr. Adolfo Rodríguez Nodals In Memorian », dans la catégorie arts plastiques. 
          
          Bien qu’elle soit au deuxième semestre de sa dernière année du secondaire de base et qu’elle soit au début des examens finaux, ainsi que de la période de demandes d’orientation (préuniversitaire, écoles vocationnelles et formations de technicien moyen), elle s’est proposée pour réaliser les illustrations des Histoires de vie de la COVID‑19. 
          
          Elle a participé, avec l’atelier d’arts visuels « Galería de Los Felices », à différents événements et au montage de l’exposition Martí et la Nature, ainsi qu’à des espaces de discussion sur l’impact de la COVID‑19. 
