    - forname:
      surname: John
      orcidurl:
      display:
      presentation: |
        Hola, me llamo Jhon, tengo dieciséis años y soy de Colombia. Llegué a Canadá el 4 de febrero de 2020, hace dos años. Cuando llegué a Canadá, me impactó el frío de mi nuevo país. Nunca había tocado la nieve en mi vida, solo la había visto en películas. Cuando cayó la primera nieve, entendí que por fin podía jugar con mi hermanito como en las películas. Mi primer año en Quebec lo pasé en Saint-Jérôme. Después nos mudamos a Trois-Rivières,  donde no conocía a nadie. Me inscribí en el SANA para hacer nuevos amigos. Mi deseo es ir a Estados Unidos a visitar a mi familia que está allá, y mi mayor sueño es ser médico y construir un hospital en mi pueblo en Colombia.   
    - forname:
      surname: Jonathan
      orcidurl:
      display:
      presentation: |
        Hola, me llamo Jonathan, soy de México, tengo trece años y hace cinco años que vivo en Canadá. Llegué a Toronto en noviembre de 2017, donde aprendí inglés durante tres años, antes de que mi papá cambiara de trabajo y nos mudáramos a Trois-Rivières. Me gustaría ir a España porque he escuchado que el jamón tradicional es muy bueno. También me gustaría aprender más sobre sus tradiciones y su cultura. Fue un amigo, cuando estaba en Toronto, quien me habló de España. Él despertó mi curiosidad por ese país. Uno de mis mayores sueños es seguir los pasos de mi padre y convertirme en ingeniero aeronáutico. En mi cuarto tengo una pequeña colección de aviones en miniatura, y eso me permite tener siempre mi sueño cerca.  
