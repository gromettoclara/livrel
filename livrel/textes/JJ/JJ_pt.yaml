title: >-
    John e Jonathan
subtitle: >-
blockcitation: true
authors:
    - forname:
      surname: John
      orcidurl:
      display:
      presentation: |
        Olá, meu nome é Jhon, tenho dezesseis anos e sou da Colômbia. Cheguei ao Canadá no dia 4 de fevereiro de 2020, há dois anos. Quando cheguei ao Canadá, fiquei impressionado com o frio do meu novo país. Nunca tinha tocado na neve na minha vida, só tinha visto em filmes. Quando a primeira neve caiu, entendi que finalmente podia brincar com meu irmãozinho como nos filmes. Meu primeiro ano em Quebec foi em Saint-Jérôme. Depois nos mudamos para Trois-Rivières, onde eu não conhecia ninguém. Me inscrevi no SANA para fazer novos amigos. Meu desejo é ir aos Estados Unidos visitar minha família que está lá, e meu maior sonho é ser médico e construir um hospital na minha cidade natal, na Colômbia.   
    - forname:
      surname: Jonathan
      orcidurl:
      display:
      presentation: |
        Olá, meu nome é Jonathan, sou do México, tenho treze anos e faz cinco anos que moro no Canadá. Cheguei a Toronto em novembro de 2017, onde aprendi inglês durante três anos, antes de meu pai mudar de trabalho e nós nos mudarmos para Trois-Rivières. Gostaria de ir à Espanha porque ouvi dizer que o presunto tradicional é muito bom. Também gostaria de aprender mais sobre as tradições e a cultura. Foi um amigo, quando eu estava em Toronto, que me falou da Espanha. Foi ele que despertou minha curiosidade por esse país. Um dos meus maiores sonhos é seguir os passos do meu pai e me tornar engenheiro aeronáutico. No meu quarto, tenho uma pequena coleção de aviões em miniatura, e isso me permite manter meu sonho sempre por perto.   
