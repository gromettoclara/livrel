      presentation: |
           Gabriela Rigñack Peña a fréquenté le Círculo Infantil Los Zapateritos, dans la municipalité de Guanabacoa, province de La Havane, où elle habite. C’est là qu’elle a reçu toute l’éducation formelle prévue par le programme de formation de ces institutions de la petite enfance. Elle était une enfant joyeuse, toujours partante. 
           
           Elle a fait de la première à la sixième année à l’école primaire Quinto Congreso, avec de bons résultats scolaires, mais avec beaucoup d’enseignants qui se succédaient à cause de problèmes de personnel. Elle a aussi eu une maîtresse qui, en troisième année, a complètement désorganisé les enfants avec ses méthodes antipédagogiques. Heureusement, à la fin de la quatrième année, cette enseignante a quitté la profession. Avec une nouvelle professeure en cinquième et sixième année, Gabriela a pu terminer l’enseignement primaire. Mais, même si les cours s’amélioraient, elle a dû affronter, à 8 ans, les conditions imposées par le confinement et la distanciation sociale pendant la pandémie de COVID-19, à Cuba et dans le monde. 
           
           Chez elle, toutes les mesures de biosécurité, de distanciation et d’isolement social ont été respectées. Personne n’est tombé malade : ni elle, ni les adultes, ni sa grand-mère, qui, en tant que personne âgée, recevait un niveau de soin très rigoureux. 
           
           Sa famille, composée de six personnes, vivait jusque-là dans l’harmonie, la joie et avec une bonne stabilité émotionnelle. Mais tout a commencé à changer avec la pandémie : l’enfermement à la maison a eu des effets sur le plus jeune, le frère de Gabriela. 
           
           Personne n’a attrapé la COVID-19 ; pourtant, comme une sorte de séquelle indirecte de ce virus, l’adolescent s’est retrouvé entraîné dans la drogue, ce qui a bouleversé la vie familiale et leur manière de vivre. 
           
           Tout le monde a été changé par cette situation, et Gabriela s’est retrouvée dans une position instable, avec un profond chagrin et un traumatisme psychosocial et affectif. 
           
           C’est elle qui raconte l’histoire, celle qui sera peut-être un roman un jour — écrite depuis la douleur, mais aussi depuis la conviction profonde de sa famille qu’ils parviendront à renverser ce fléau, avec l’aide médicale nécessaire. Gabriela, une véritable guerrière, finira par vaincre la douleur. 
